<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Mini9 로그아웃">
  <title>로그아웃 — Mini9</title>
  <link rel="stylesheet" href="/users/app.css">
</head>
<body>
  <div data-site-header></div>
  <main class="page page--narrow" style="min-height:calc(100vh - 150px);display:grid;place-items:center">
    <section class="card" style="width:100%;text-align:center">
      <div class="card__body" style="padding:52px 28px">
        <div class="empty__mark" aria-hidden="true">↗</div>
        <p class="eyebrow">Sign out</p>
        <h1 style="font-size:38px">로그아웃할까요?</h1>
        <p class="lead" style="margin:0 auto 26px;font-size:15px">
          이 브라우저에 저장된 로그인 정보가 지워집니다.
          작성한 할 일과 일정은 그대로 유지됩니다.
        </p>
        <div class="btn-row" style="justify-content:center">
          <button class="btn btn--secondary" id="logoutButton" type="button">로그아웃</button>
          <a class="btn btn--quiet" id="backLink" href="home.html">돌아가기</a>
        </div>
      </div>
    </section>
  </main>

  <script src="/users/app.js"></script>
  <script>
    document.querySelector("#backLink").href = Mini9.accessToken() ? "todo.html" : "home.html";
    const button = document.querySelector("#logoutButton");
    if (!Mini9.accessToken()) {
      button.textContent = "홈으로 이동";
      button.addEventListener("click", () => location.replace("home.html"));
    } else {
      button.addEventListener("click", async () => {
        button.disabled = true;
        button.textContent = "로그아웃 중…";
        await Mini9.logout();
      });
    }
  </script>
</body>
</html>

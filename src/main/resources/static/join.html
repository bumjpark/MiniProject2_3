<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Mini9 회원가입">
  <title>계정 만들기 — Mini9</title>
  <link rel="stylesheet" href="/users/app.css">
</head>
<body>
  <main class="auth-page">
    <div class="auth-shell">
      <section class="auth-story" aria-label="Mini9 소개">
        <a class="brand" href="home.html">
          <span class="brand__mark">M9</span><span>Mini9</span>
        </a>
        <div>
          <p class="eyebrow" style="color:#2997ff">Start clear</p>
          <h1>복잡한 하루를 단순하게 시작하세요.</h1>
          <p>계정을 만들고 나만의 할 일 목록과 공유 캘린더를 바로 구성할 수 있습니다.</p>
        </div>
        <div class="auth-story__note">
          <span>✓</span><span>세 가지 정보만으로 시작할 수 있습니다.</span>
        </div>
      </section>

      <section class="auth-form">
        <div class="auth-form__head">
          <h2>계정 만들기</h2>
          <p>Mini9을 시작하기 위한 기본 정보를 입력하세요.</p>
        </div>
        <div id="status" class="status-strip" role="alert" hidden></div>
        <form id="joinForm">
          <div class="field">
            <label for="name">이름</label>
            <input class="input" id="name" name="name" autocomplete="name"
                   maxlength="50" placeholder="표시할 이름" required autofocus>
          </div>
          <div class="field">
            <label for="email">이메일</label>
            <input class="input" id="email" name="email" type="email"
                   autocomplete="email" placeholder="name@example.com" required>
          </div>
          <div class="field">
            <label for="password">비밀번호</label>
            <input class="input" id="password" name="password" type="password"
                   autocomplete="new-password" minlength="8" placeholder="8자 이상 입력하세요" required>
            <p class="field__hint">다른 서비스에서 사용하지 않는 비밀번호를 권장합니다.</p>
          </div>
          <button class="btn" id="submitButton" type="submit">계정 만들기</button>
        </form>
        <p class="auth-form__foot">
          이미 계정이 있나요? <a href="login.html">로그인</a>
          · <a href="home.html">홈으로</a>
        </p>
      </section>
    </div>
  </main>

  <script src="/users/app.js"></script>
  <script>
    const form = document.querySelector("#joinForm");
    const button = document.querySelector("#submitButton");
    const status = document.querySelector("#status");

    form.addEventListener("submit", async (event) => {
      event.preventDefault();
      Mini9.showStatus(status, "");
      button.disabled = true;
      button.textContent = "계정 만드는 중…";
      try {
        await Mini9.api("/users/signup", {
          method: "POST",
          body: JSON.stringify({
            name: form.name.value.trim(),
            email: form.email.value.trim(),
            password: form.password.value
          })
        });
        Mini9.showStatus(status, "계정이 만들어졌습니다. 로그인 화면으로 이동합니다.", "success");
        window.setTimeout(() => location.replace("login.html"), 900);
      } catch (error) {
        Mini9.showStatus(status, error.message || "계정을 만들지 못했습니다.", "error");
      } finally {
        button.disabled = false;
        button.textContent = "계정 만들기";
      }
    });
  </script>
</body>
</html>
